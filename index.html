<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="description" content="Rainbow Six Siege taktik kütüphanesi - harita, operatör ve site bazında taktik videolarını kaydet ve filtrele">
    <meta name="theme-color" content="#0f1210">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>R6SX Tactics Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="icon" type="image/png" href="icon-192.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header -->
    <header class="app-header">
        <div class="header-content">
            <div class="logo-area">
                <div class="logo-icon">
                    <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M20 2L36 11V29L20 38L4 29V11L20 2Z" stroke="currentColor" stroke-width="2" fill="none"/>
                        <path d="M20 8L30 14V26L20 32L10 26V14L20 8Z" stroke="currentColor" stroke-width="1.5" fill="none" opacity="0.6"/>
                        <circle cx="20" cy="20" r="4" fill="currentColor" opacity="0.8"/>
                    </svg>
                </div>
                <div class="logo-text">
                    <h1>R6SX TACTICS</h1>
                    <span class="logo-subtitle">Taktik Kütüphanesi</span>
                </div>
            </div>
            <div class="header-actions">
                <button class="btn-icon" id="btnImport" title="İçe Aktar">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                </button>
                <button class="btn-icon" id="btnExport" title="Dışa Aktar">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                </button>
                <button class="btn-primary" id="btnAdd">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    <span>Ekle</span>
                </button>
            </div>
        </div>
    </header>

    <!-- Filters -->
    <section class="filters-section">
        <div class="search-bar">
            <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="searchInput" placeholder="Taktik ara... (harita, operatör, açıklama)">
            <button class="search-clear hidden" id="searchClear">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
        <div class="filter-chips">
            <div class="filter-group">
                <select id="filterMap" class="filter-select">
                    <option value="">🗺️ Tüm Haritalar</option>
                </select>
            </div>
            <div class="filter-group">
                <select id="filterOperator" class="filter-select">
                    <option value="">👤 Tüm Operatörler</option>
                </select>
            </div>
            <div class="filter-group">
                <select id="filterCategory" class="filter-select">
                    <option value="">🏷️ Tüm Kategoriler</option>
                </select>
            </div>
            <div class="filter-group">
                <select id="filterFloor" class="filter-select">
                    <option value="">🏢 Tüm Katlar</option>
                    <option value="B">B (Basement)</option>
                    <option value="1F">1F</option>
                    <option value="2F">2F</option>
                    <option value="3F">3F</option>
                </select>
            </div>
            <div class="filter-group">
                <select id="filterRole" class="filter-select">
                    <option value="">⚔️ Tüm Roller</option>
                    <option value="Defender">🛡️ Defender</option>
                    <option value="Attacker">⚔️ Attacker</option>
                </select>
            </div>
            <button class="filter-reset hidden" id="filterReset">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>
                Filtreleri Temizle
            </button>
        </div>
        <div class="results-count" id="resultsCount"></div>
    </section>

    <!-- Tactics Grid -->
    <main class="tactics-grid" id="tacticsGrid">
        <!-- Cards will be injected by JS -->
    </main>

    <!-- Empty State -->
    <div class="empty-state hidden" id="emptyState">
        <div class="empty-icon">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M20 2L36 11V29L20 38L4 29V11L20 2Z" transform="scale(0.5) translate(4,4)"/><circle cx="12" cy="12" r="8" opacity="0.3"/><line x1="8" y1="12" x2="16" y2="12" stroke-width="1.5" opacity="0.5"/></svg>
        </div>
        <h3 id="emptyTitle">Henüz taktik yok</h3>
        <p id="emptyMessage">İlk taktiğini eklemek için yukarıdaki "Ekle" butonuna tıkla!</p>
    </div>

    <!-- Add/Edit Modal -->
    <div class="modal-overlay hidden" id="modalOverlay">
        <div class="modal" id="tacticModal">
            <div class="modal-header">
                <h2 id="modalTitle">Yeni Taktik Ekle</h2>
                <button class="btn-icon modal-close" id="modalClose">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <form id="tacticForm" class="modal-body">
                <div class="form-row">
                    <div class="form-group">
                        <label for="inputMap">Harita *</label>
                        <select id="inputMap" required>
                            <option value="">Harita seç...</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="inputCategory">Kategori *</label>
                        <select id="inputCategory" required>
                            <option value="">Kategori seç...</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="inputFloor">Kat</label>
                        <select id="inputFloor">
                            <option value="ANY">ANY</option>
                            <option value="B">B (Basement)</option>
                            <option value="1F">1F</option>
                            <option value="2F">2F</option>
                            <option value="3F">3F</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="inputRole">Rol</label>
                        <select id="inputRole">
                            <option value="Defender">🛡️ Defender</option>
                            <option value="Attacker">⚔️ Attacker</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="inputSite">Bölge / Site</label>
                    <input type="text" id="inputSite" placeholder="Örn: Armory / Archives">
                </div>
                <div class="form-group">
                    <label for="inputOperator">Operatör</label>
                    <select id="inputOperator">
                        <option value="">Operatör seç (opsiyonel)...</option>
                        <option value="Genel">Genel</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="inputDescription">Açıklama / Notlar</label>
                    <textarea id="inputDescription" rows="3" placeholder="Taktik hakkında kısa notlar..."></textarea>
                </div>
                <div class="form-group">
                    <label for="inputLink">Video Linki *</label>
                    <input type="url" id="inputLink" placeholder="https://instagram.com/reel/... veya youtube.com/..." required>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-secondary" id="btnCancel">İptal</button>
                    <button type="submit" class="btn-primary btn-wide">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
                        <span id="btnSubmitText">Kaydet</span>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div class="modal-overlay hidden" id="deleteOverlay">
        <div class="modal modal-small">
            <div class="modal-header">
                <h2>Taktiği Sil</h2>
            </div>
            <div class="modal-body">
                <p class="delete-message">Bu taktiği silmek istediğinden emin misin? Bu işlem geri alınamaz.</p>
                <div class="delete-preview" id="deletePreview"></div>
                <div class="form-actions">
                    <button class="btn-secondary" id="btnDeleteCancel">İptal</button>
                    <button class="btn-danger" id="btnDeleteConfirm">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
                        Sil
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Import Modal -->
    <div class="modal-overlay hidden" id="importOverlay">
        <div class="modal modal-small">
            <div class="modal-header">
                <h2>Veri İçe Aktar</h2>
                <button class="btn-icon modal-close" id="importClose">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <div class="modal-body">
                <p>Daha önce dışa aktardığın JSON dosyasını seç:</p>
                <input type="file" id="importFile" accept=".json" class="file-input">
                <div class="form-actions">
                    <button class="btn-secondary" id="btnImportCancel">İptal</button>
                    <button class="btn-primary" id="btnImportConfirm">İçe Aktar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast hidden" id="toast">
        <span id="toastMessage"></span>
    </div>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js');
        }
    </script>
</body>
</html>
